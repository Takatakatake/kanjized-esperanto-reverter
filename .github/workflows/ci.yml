name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reverter
        uses: actions/checkout@v4
        with:
          path: kanjized-esperanto-reverter
      # Pin the upstream Monaco checkout to the exact commit the bundled CSV was generated from
      # (recorded in monaco-commit.txt, updated whenever the CSV is regenerated). This keeps CI
      # hermetic — an unrelated reverter PR won't go red just because Monaco main moved ahead — and
      # makes the byte-for-byte sync check (incl. source_line) compare against the matching all.json.
      - name: Resolve pinned Monaco commit
        id: monaco
        run: echo "ref=$(tr -d '[:space:]' < kanjized-esperanto-reverter/monaco-commit.txt)" >> "$GITHUB_OUTPUT"
      - name: Checkout Monaco (pinned dictionary source)
        uses: actions/checkout@v4
        with:
          repository: Takatakatake/kanji-esperanto-monaco
          ref: ${{ steps.monaco.outputs.ref }}
          path: kanji-esperanto-monaco
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: kanjized-esperanto-reverter
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run unit tests
        working-directory: kanjized-esperanto-reverter
        run: python -m pytest -q
      - name: Verify the bundled CSV is in sync with Monaco all.json
        working-directory: kanjized-esperanto-reverter
        run: python tools/check_dictionary_sync.py
